server:
  port: 8083

spring:
  application:
    name: myorders-service

  datasource:
    url: jdbc:mysql://localhost:3306/order_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000

logging:
  level:
    com.ecommerce.client: DEBUG